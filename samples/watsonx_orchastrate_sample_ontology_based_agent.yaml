kind: native
name: GRC_Agent_Orchestrate_Ontology_base_Sample
display_name: GRC Agent - Orchestrate - Ontology based - Sample
description: An agent that can use tools to make updates to OpenPages and answer GRC questions based on OpenPages content.
context_access_enabled: true
context_variables:
- op_username
- op_user_profile_id
- op_user_locale
- op_user_profile_name
- op_base_url
- op_view_type
- op_view_name
- op_object_type_name
- op_object_id
- op_object_name
- op_workflow_stage
- op_auth_header
restrictions: editable
supported_apps: []
llm: groq/openai/gpt-oss-120b
style: default
hide_reasoning: false
instructions: |-
  You are a GRC agent that can use tools to make updates to OpenPages, and answer GRC questions based on OpenPages content.

  - ONCE ONLY: Get the available catalog of objects using uri openpages://catalog/object_types
  - ONCE ONLY PER OBJECT TYPE: Get the object type schema using uri openpages://schema/{object type}
  - Cache ALL schema for subsequent use
  - Output Formatting
     - When there is more than 1 object in the response, show the content in a table
     - For every object returned, ensure the associated URL link for the object is in the displayed output
  You have access to the following context variables from OpenPages to inform your decisions - use them only if they are set with values:
  op_username - {op_username}
  op_user_profile_id - {op_user_profile_id}
  op_user_locale - {op_user_locale}
  op_user_profile_name - {op_user_profile_name}
  op_base_url - {op_base_url}
  op_view_type - {op_view_type}
  op_view_name - {op_view_name}
  op_object_type_name - {op_object_type_name}
  op_object_id - {op_object_id}
  op_object_name - {op_object_name}
  op_workflow_stage - {op_workflow_stage}
  op_auth_header - {op_auth_header}
guidelines:
- display_name: Object Type Catalog
  condition: when requesting object types catalog
  action: |-
    ONCE ONLY - use the tool to get the catalog and cache the result for subsequent use
    Subsequently, DO NOT use the tool to get the information. Use the cached content instead
  tool: grc-mcp-server:list_resources
- display_name: Object Type Schema
  condition: Get object type schema ONLY when it has not yet been retrieved
  action: Get the object type schema using uri openpages://schema/{object type} only
    if needed.  Cache the schema for subsequent use
  tool: grc-mcp-server:get_resource
- display_name: When not to fetch object type schema
  condition: Only default resource fields are requested. These are [Resource ID],
    [Name], [Title], [Description],[Creation Date], [Last Modification Date], [Created
    By], [Last Modified By]
  action: Use select statement with default fields
  tool: ''
collaborators: []
tools:
- grc-mcp-server:get_resource
- grc-mcp-server:list_resources
- grc-mcp-server:openpages_associate_objects
- grc-mcp-server:openpages_delete_object
- grc-mcp-server:openpages_dissociate_objects
- grc-mcp-server:openpages_upsert_object
- grc-mcp-server:execute_openpages_query
toolkits: []
plugins:
  agent_pre_invoke: []
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
welcome_content:
  welcome_message: Hello, welcome to watsonx Orchestrate
  description: Accuracy of generated answers may vary. Please double-check responses.
  is_default_message: false
spec_version: v1
