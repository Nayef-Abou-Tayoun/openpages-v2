version: '3.8'

# Docker Compose automatically reads .env file from the same directory
# Variables defined in .env will be used for ${VAR_NAME} substitutions below

services:
  grc-mcp-server:
    build: .
    container_name: grc-mcp-server
    ports:
      - "${PORT:-8000}:8000"
    environment:
      # Application Settings
      - APP_NAME=${APP_NAME:-GRC MCP Server}
      - DEBUG=${DEBUG:-False}
      - SERVER_MODE=${SERVER_MODE:-remote}
      
      # Server Settings
      - HOST=${HOST:-0.0.0.0}
      - PORT=8000
      
      # OpenPages Configuration
      - OPENPAGES_BASE_URL=${OPENPAGES_BASE_URL:-https://openpages-server.example.com}
      - OPENPAGES_AUTHENTICATION_TYPE=${OPENPAGES_AUTHENTICATION_TYPE:-basic}
      - OPENPAGES_USERNAME=${OPENPAGES_USERNAME:-admin}
      - OPENPAGES_PASSWORD=${OPENPAGES_PASSWORD:-password}
      - OPENPAGES_APIKEY=${OPENPAGES_APIKEY:-}
      - OPENPAGES_AUTHENTICATION_URL=${OPENPAGES_AUTHENTICATION_URL:-}
      
      # SSL Settings
      - SSL_VERIFY=${SSL_VERIFY:-True}
      
      # Logging Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_FILE=${LOG_FILE:-logs/grc-mcp.log}
      
      # Observability Settings
      - OBSERVABILITY_ENABLED=${OBSERVABILITY_ENABLED:-True}
      
      # Metrics Configuration
      - METRICS_ENABLED=${METRICS_ENABLED:-True}
      
      # Distributed Tracing Configuration
      # Note: Set OTLP_ENDPOINT to your tracing backend if deployed separately
      - TRACING_ENABLED=${TRACING_ENABLED:-False}
      - OTLP_ENDPOINT=${OTLP_ENDPOINT:-}
      - CONSOLE_TRACING=${CONSOLE_TRACING:-False}
      
      # Rate Limiting Configuration
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-True}
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      - RATE_LIMIT_BURST_SIZE=${RATE_LIMIT_BURST_SIZE:-10}
      
      # Object Types Configuration
      - OBJECT_TYPES_CONFIG_PATH=${OBJECT_TYPES_CONFIG_PATH:-src/app/config/object_types.json}
      - OUTPUT_FORMAT=${OUTPUT_FORMAT:-text}
    
    volumes:
      # Volume mounts for configuration and logging
      # IMPORTANT: For Podman on macOS, create the logs directory first:
      #   mkdir -p logs
      # Docker will auto-create the directory, but Podman requires it to exist.
      - ./src/app/config/object_types.json:/app/src/app/config/object_types.json:ro
      - ./logs:/app/logs
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    
    restart: unless-stopped
    
    networks:
      - mcp-network
    
    # Uses CMD from Dockerfile: python main.py --mode remote

  # Optional: Add nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: grc-mcp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      grc-mcp-server:
        condition: service_healthy
    networks:
      - mcp-network
    restart: unless-stopped
    profiles:
      - with-proxy

networks:
  mcp-network:
    driver: bridge

# volumes:
  # Commented out for Podman compatibility
  # Uncomment if using Docker and want persistent logs
  # logs:
  #   driver: local

