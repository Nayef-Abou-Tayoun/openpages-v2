# Prometheus Configuration for GRC MCP Server

global:
  scrape_interval: 60s
  evaluation_interval: 60s
  external_labels:
    cluster: 'grc-mcp-cluster'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  # - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # GRC MCP Server metrics
  - job_name: 'grc-mcp-server'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'
    scrape_interval: 60s
    scrape_timeout: 10s
    # Add basic auth or other config if needed

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Jaeger metrics (if exposed)
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
    metrics_path: '/metrics'